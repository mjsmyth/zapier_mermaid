# zapier_node_config.yaml
#
# Registry of all known Zapier (api, action) pairs.
# Each entry defines:
#   display_name:  Human-readable name for the step
#   node_type:     trigger | action | filter | search | subzap
#   params:        list of param extractions { source_key, target_key, truncate (optional) }
#   constants:     (optional) fixed key/value pairs always written to node_doc
#   special:       (optional) name of Python handler for conditional logic
#
# Each API also has a _meta section with:
#   provider:    name of the provider (must match a key in the providers section below)
#   emoji:       displayed in the diagram node label
#
# To change a provider's colour, update it once in the providers section below.
# To add a new integration: add an entry under the api_name with the action name,
# fill in display_name, node_type, and any params to extract. No Python changes needed
# unless the logic is conditional (like webhooks or filters).

providers:
  Attio:
    style: "fill:#EEECEA,stroke:#5F5E5A,stroke-width:0.5px,color:#2C2C2A"
  Brevo:
    style: "fill:#D0EEF8,stroke:#0B6080,stroke-width:0.5px,color:#03293A"
  GitHub:
    style: "fill:#D6F0E8,stroke:#0F6E56,stroke-width:0.5px,color:#04342C"
  "Google Drive":
    style: "fill:#FEFBD0,stroke:#9A7E00,stroke-width:0.5px,color:#3D3000"
  "Google Sheets":
    style: "fill:#FBEAF0,stroke:#993556,stroke-width:0.5px,color:#4B1528"
  LaunchBay:
    style: "fill:#D6E8F9,stroke:#185FA5,stroke-width:0.5px,color:#042C53"
  Notion:
    style: "fill:#E2E0FB,stroke:#534AB7,stroke-width:0.5px,color:#26215C"
  Slack:
    style: "fill:#F2DCE8,stroke:#8C2258,stroke-width:0.5px,color:#3D0825"
  Zapier:
    style: "fill:#FCE8C4,stroke:#BA7517,stroke-width:0.5px,color:#4124027"

